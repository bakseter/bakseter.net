apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web
  namespace: bakseter-net
spec:
  parentRefs:
    - name: traefik-gateway
      sectionName: public
      kind: Gateway
      namespace: traefik

  hostnames:
    - bakseter.net

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: web
          port: 80
